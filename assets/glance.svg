<svg width="840" height="150" viewBox="0 0 840 150" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Career metrics at a glance">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="num" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <style>
      .card { fill:#0d1117; stroke:#30363d; stroke-width:1; }
      .num  { font:800 34px 'Segoe UI',Ubuntu,'Helvetica Neue',sans-serif; fill:url(#num); text-anchor:middle; }
      .lab  { font:600 12.5px 'Segoe UI',Ubuntu,'Helvetica Neue',sans-serif; fill:#e6edf3; text-anchor:middle; }
      .sub  { font:400 10.5px 'Segoe UI',Ubuntu,'Helvetica Neue',sans-serif; fill:#8b949e; text-anchor:middle; }
      .sep  { stroke:#21262d; stroke-width:1; }
      .stat { opacity:0; animation:rise .45s cubic-bezier(.22,1,.36,1) forwards; }
      .s1{animation-delay:0s}.s2{animation-delay:.08s}.s3{animation-delay:.16s}.s4{animation-delay:.24s}.s5{animation-delay:.32s}
      @keyframes rise { from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:translateY(0)} }
      .bar { animation:sweep 3.2s ease-in-out infinite alternate; }
      @keyframes sweep { from{opacity:.55} to{opacity:1} }
    </style>
  </defs>

  <rect class="card" x="1" y="1" width="838" height="148" rx="16"/>
  <rect class="bar" x="1" y="1" width="838" height="4" rx="2" fill="url(#accent)"/>

  <g class="stat s1">
    <text class="num" x="92" y="72">6</text>
    <text class="lab" x="92" y="98">Publications</text>
    <text class="sub" x="92" y="116">incl. IEEE Access</text>
  </g>
  <line class="sep" x1="176" y1="38" x2="176" y2="118"/>

  <g class="stat s2">
    <text class="num" x="260" y="72">13</text>
    <text class="lab" x="260" y="98">Awards</text>
    <text class="sub" x="260" y="116">competitions &amp; papers</text>
  </g>
  <line class="sep" x1="344" y1="38" x2="344" y2="118"/>

  <g class="stat s3">
    <text class="num" x="428" y="72">2</text>
    <text class="lab" x="428" y="98">Ministerial Grand Prizes</text>
    <text class="sub" x="428" y="116">MOTIE · 2023 &amp; 2024</text>
  </g>
  <line class="sep" x1="512" y1="38" x2="512" y2="118"/>

  <g class="stat s4">
    <text class="num" x="596" y="72">1</text>
    <text class="lab" x="596" y="98">Book · Tech Review</text>
    <text class="sub" x="596" y="116">LangChain, Youngjin 2026</text>
  </g>
  <line class="sep" x1="680" y1="38" x2="680" y2="118"/>

  <g class="stat s5">
    <text class="num" x="762" y="72">40+</text>
    <text class="lab" x="762" y="98">Open Models</text>
    <text class="sub" x="762" y="116">POLAR · KoModernBERT</text>
  </g>
</svg>

<svg width="840" height="8" viewBox="0 0 840 8" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="divider">
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="20%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="80%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glint" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <style>
      .glint { animation: slide 3.5s ease-in-out infinite; }
      @keyframes slide { 0%{transform:translateX(-300px)} 100%{transform:translateX(1140px)} }
    </style>
  </defs>
  <rect x="0" y="3" width="840" height="2" rx="1" fill="url(#line)"/>
  <rect class="glint" x="0" y="2.5" width="180" height="3" rx="1.5" fill="url(#glint)" opacity="0.6"/>
</svg>

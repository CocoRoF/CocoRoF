name: Refresh contribution snake

on:
  schedule:
    - cron: "0 15 * * *"   # daily 00:00 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake-light.svg?color_snake=%237c3aed
            dist/snake-dark.svg?palette=github-dark&color_snake=%23a78bfa

      - name: Commit refreshed snakes
        run: |
          cp dist/snake-light.svg dist/snake-dark.svg assets/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/snake-light.svg assets/snake-dark.svg
          git diff --cached --quiet || git commit -m "chore: refresh contribution snake"
          git push
